name: Build mainWeb Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'mainWeb/**'

permissions:
  contents: read
  packages: write


jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./mainWeb
          file: ./mainWeb/Dockerfile
          push: true
          no-cache: true
          tags: ghcr.io/mikalasa/profile-mainweb:latest


      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to EliteMini
        run: |
          curl -f -v http://elitemini-870:9000/hooks/profile-mainweb